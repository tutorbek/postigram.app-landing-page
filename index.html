<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Postigram — Something extraordinary is being built</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230a0a0a'/%3E%3Ccircle cx='16' cy='16' r='7' fill='none' stroke='%23ff3b1f' stroke-width='1.5'/%3E%3Ccircle cx='16' cy='16' r='2.5' fill='%23ff3b1f'/%3E%3Ccircle cx='16' cy='9' r='1.2' fill='%23ff3b1f' opacity='.9'/%3E%3Ccircle cx='22.1' cy='12.5' r='1.2' fill='%23ff3b1f' opacity='.6'/%3E%3Ccircle cx='22.1' cy='19.5' r='1.2' fill='%23ff3b1f' opacity='.4'/%3E%3Ccircle cx='16' cy='23' r='1.2' fill='%23ff3b1f' opacity='.3'/%3E%3Ccircle cx='9.9' cy='19.5' r='1.2' fill='%23ff3b1f' opacity='.4'/%3E%3Ccircle cx='9.9' cy='12.5' r='1.2' fill='%23ff3b1f' opacity='.6'/%3E%3Cline x1='16' y1='9' x2='16' y2='13.5' stroke='%23ff3b1f' stroke-width='.8' opacity='.5'/%3E%3Cline x1='22.1' y1='12.5' x2='18' y2='14.8' stroke='%23ff3b1f' stroke-width='.8' opacity='.4'/%3E%3Cline x1='22.1' y1='19.5' x2='18' y2='17.2' stroke='%23ff3b1f' stroke-width='.8' opacity='.3'/%3E%3Cline x1='16' y1='23' x2='16' y2='18.5' stroke='%23ff3b1f' stroke-width='.8' opacity='.3'/%3E%3Cline x1='9.9' y1='19.5' x2='14' y2='17.2' stroke='%23ff3b1f' stroke-width='.8' opacity='.3'/%3E%3Cline x1='9.9' y1='12.5' x2='14' y2='14.8' stroke='%23ff3b1f' stroke-width='.8' opacity='.4'/%3E%3C/svg%3E"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafaf8;
      --ink: #0a0a0a;
      --mid: #888;
      --faint: rgba(10,10,10,0.06);
      --faint2: rgba(10,10,10,0.04);
      --red: #ff3b1f;
      --red-glow: rgba(255,59,31,0.15);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Space Mono', monospace;
      overflow: hidden;
      cursor: none;
    }

    /* CURSOR */
    #cur {
      position: fixed; z-index: 9999;
      width: 8px; height: 8px;
      background: var(--red);
      border-radius: 50%;
      pointer-events: none;
      left: 0; top: 0;
      transform: translate(-50%,-50%);
      transition: width .15s, height .15s;
      box-shadow: 0 0 12px var(--red-glow);
      will-change: left,top;
    }
    #cur.h { width: 16px; height: 16px; }
    #cur-r {
      position: fixed; z-index: 9998;
      width: 32px; height: 32px;
      border: 1px solid rgba(10,10,10,0.15);
      border-radius: 50%;
      pointer-events: none;
      left: 0; top: 0;
      transform: translate(-50%,-50%);
      transition: width .22s, height .22s, border-color .22s;
      will-change: left,top;
    }
    #cur-r.h { width: 48px; height: 48px; border-color: rgba(255,59,31,0.3); }

    /* CANVAS */
    #cv { position: fixed; inset: 0; z-index: 0; }

    /* GRID */
    .grid {
      position: fixed; inset: 0; z-index: 1;
      background-image:
        linear-gradient(var(--faint) 1px, transparent 1px),
        linear-gradient(90deg, var(--faint) 1px, transparent 1px);
      background-size: 80px 80px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
    }

    /* SCAN */
    .scan {
      position: fixed; left: 0; right: 0; height: 1px; z-index: 2;
      background: linear-gradient(90deg, transparent 0%, rgba(255,59,31,0.12) 50%, transparent 100%);
      animation: scanline 9s linear infinite;
    }
    @keyframes scanline { from { top: -1px; } to { top: 100vh; } }

    /* CORNERS */
    .c { position: fixed; z-index: 6; pointer-events: none; }
    .c::before, .c::after { content: ''; position: absolute; background: rgba(10,10,10,0.2); }
    .c::before { width: 1px; height: 28px; }
    .c::after  { width: 28px; height: 1px; }
    .c.tl { top: 24px; left: 24px; }
    .c.tr { top: 24px; right: 24px; transform: scaleX(-1); }
    .c.bl { bottom: 24px; left: 24px; transform: scaleY(-1); }
    .c.br { bottom: 24px; right: 24px; transform: scale(-1); }

    /* SIDE LABELS */
    .side {
      position: fixed; z-index: 5; pointer-events: none;
      font-family: 'Space Mono', monospace; font-size: .42rem;
      letter-spacing: .28em; color: rgba(10,10,10,0.18);
      text-transform: uppercase;
    }
    .side.l { left: 1.2rem; top: 50%; transform: translateX(-50%) translateY(-50%) rotate(-90deg); }
    .side.r { right: 1.2rem; top: 50%; transform: translateX(50%) translateY(-50%) rotate(90deg); }

    /* MAIN */
    main {
      position: relative; z-index: 10;
      height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem; gap: 0;
      text-align: center;
    }

    /* STATUS */
    .status {
      display: flex; align-items: center; gap: .55rem;
      font-size: .6rem; letter-spacing: .22em; color: var(--mid);
      margin-bottom: 2.8rem;
      opacity: 0; animation: rise .7s .1s forwards;
    }
    .status-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 8px var(--red);
      animation: blink 1.8s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    /* WORDMARK */
    .wordmark {
      font-family: 'Syne', sans-serif;
      font-size: clamp(3.8rem, 11vw, 9.5rem);
      font-weight: 800;
      letter-spacing: -.04em;
      line-height: .92;
      color: var(--ink);
      position: relative;
      margin-bottom: .5rem;
      opacity: 0; animation: rise .9s .25s forwards;
      user-select: none;
    }
    .wordmark .post { color: var(--ink); }
    .wordmark .gram {
      color: var(--red);
      position: relative;
      display: inline-block;
    }
    /* glitch slices */
    .wordmark .gram::before,
    .wordmark .gram::after {
      content: 'gram';
      position: absolute; left: 0; top: 0;
      color: var(--red);
      pointer-events: none;
    }
    .wordmark .gram::before {
      clip-path: polygon(0 15%, 100% 15%, 100% 38%, 0 38%);
      animation: gA 6s 2s infinite;
      opacity: 0;
    }
    .wordmark .gram::after {
      clip-path: polygon(0 60%, 100% 60%, 100% 78%, 0 78%);
      animation: gB 6s 2.3s infinite;
      opacity: 0;
      filter: blur(.5px);
    }
    @keyframes gA {
      0%,85%,100%{opacity:0;transform:none}
      87%{opacity:.6;transform:translate(-3px,1px)}
      89%{opacity:.3;transform:translate(2px,-1px)}
      91%{opacity:.5;transform:translate(-1px,0)}
      93%{opacity:0;transform:none}
    }
    @keyframes gB {
      0%,85%,100%{opacity:0;transform:none}
      88%{opacity:.4;transform:translate(3px,0)}
      90%{opacity:.6;transform:translate(-2px,1px)}
      92%{opacity:0;transform:none}
    }

    /* DOMAIN TAG */
    .domain-tag {
      font-size: clamp(.55rem, 1.1vw, .72rem);
      letter-spacing: .22em;
      color: rgba(10,10,10,0.28);
      margin-bottom: 2.6rem;
      opacity: 0; animation: rise .7s .45s forwards;
    }

    /* TAGLINE */
    .tagline {
      font-family: 'Space Mono', monospace;
      font-size: clamp(.72rem, 1.6vw, .95rem);
      font-weight: 400;
      letter-spacing: .04em;
      color: var(--mid);
      line-height: 1.9;
      max-width: 420px;
      margin-bottom: 3rem;
      opacity: 0; animation: rise .7s .6s forwards;
    }

    /* TELEGRAM BTN */
    .tg {
      display: inline-flex; align-items: center; gap: .7rem;
      font-family: 'Space Mono', monospace;
      font-size: .62rem; letter-spacing: .14em;
      color: var(--bg);
      background: var(--ink);
      padding: .9rem 2.2rem;
      border-radius: 2px;
      text-decoration: none;
      position: relative; overflow: hidden;
      opacity: 0; animation: rise .7s .78s forwards;
      transition: transform .25s, box-shadow .25s;
      margin-bottom: 3.2rem;
    }
    .tg::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--red);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform .4s cubic-bezier(.16,1,.3,1);
    }
    .tg:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(10,10,10,0.15); }
    .tg:hover::before { transform: scaleX(1); }
    .tg svg, .tg span { position: relative; z-index: 1; }

    /* METRICS ROW */
    .metrics {
      display: flex; align-items: center; gap: 2.4rem;
      opacity: 0; animation: rise .7s .95s forwards;
    }
    .metric { text-align: center; }
    .metric-val {
      font-family: 'Syne', sans-serif;
      font-size: 1.35rem; font-weight: 800;
      letter-spacing: -.03em;
      color: var(--ink);
      display: block; line-height: 1;
    }
    .metric-lbl {
      font-size: .42rem; letter-spacing: .18em;
      color: rgba(10,10,10,0.28);
      text-transform: uppercase;
      margin-top: .3rem;
    }
    .m-div { width: 1px; height: 28px; background: var(--faint2); border: none; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* NOISE TEXTURE OVERLAY */
    .noise {
      position: fixed; inset: 0; z-index: 3;
      pointer-events: none;
      opacity: .025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 128px;
    }

    /* BOTTOM TICKER */
    .ticker {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 8;
      border-top: 1px solid var(--faint);
      background: rgba(250,250,248,0.8);
      backdrop-filter: blur(8px);
      height: 32px;
      display: flex; align-items: center;
      overflow: hidden;
    }
    .ticker-inner {
      display: flex; gap: 0;
      animation: tick 22s linear infinite;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .tick-item {
      display: inline-flex; align-items: center; gap: 14px;
      padding: 0 28px;
      font-size: .42rem; letter-spacing: .2em;
      color: rgba(10,10,10,0.22);
    }
    .tick-red { color: var(--red); }
    .tick-dot { width: 3px; height: 3px; border-radius: 50%; background: currentColor; opacity: .4; }
    @keyframes tick { from { transform: translateX(0); } to { transform: translateX(-50%); } }

    @media (max-width: 600px) {
      .side { display: none; }
      .metrics { gap: 1.4rem; }
      .metric-val { font-size: 1.05rem; }
    }
  </style>
</head>
<body>

<div id="cur"></div>
<div id="cur-r"></div>

<canvas id="cv"></canvas>
<div class="grid"></div>
<div class="scan"></div>
<div class="noise"></div>

<div class="c tl"></div>
<div class="c tr"></div>
<div class="c bl"></div>
<div class="c br"></div>

<div class="side l">POSTIGRAM.APP // INITIALIZING</div>
<div class="side r">CONTENT INTELLIGENCE // v0.1</div>

<main>
  <div class="status">
    <div class="status-dot"></div>
    <span id="status-txt">SYSTEM ONLINE</span>
  </div>

  <h1 class="wordmark">
    <span class="post">Posti</span><span class="gram">gram</span>
  </h1>

  <div class="domain-tag">postigram.app</div>

  <p class="tagline">
    Something extraordinary<br>is being built.
  </p>

  <a class="tg" href="https://t.me/bkzd19" target="_blank">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
      <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
    </svg>
    <span>TELEGRAM</span>
  </a>

  <div class="metrics">
    <div class="metric">
      <span class="metric-val" id="mv-d">—</span>
      <div class="metric-lbl">Days</div>
    </div>
    <hr class="m-div"/>
    <div class="metric">
      <span class="metric-val" id="mv-h">—</span>
      <div class="metric-lbl">Hours</div>
    </div>
    <hr class="m-div"/>
    <div class="metric">
      <span class="metric-val" id="mv-m">—</span>
      <div class="metric-lbl">Min</div>
    </div>
    <hr class="m-div"/>
    <div class="metric">
      <span class="metric-val" id="mv-s">—</span>
      <div class="metric-lbl">Sec</div>
    </div>
  </div>
</main>

<!-- TICKER -->
<div class="ticker">
  <div class="ticker-inner" id="ticker-inner"></div>
</div>

<script>
/* CURSOR */
const cur = document.getElementById('cur');
const curR = document.getElementById('cur-r');
let cx=-50, cy=-50, rx=-50, ry=-50;
document.addEventListener('mousemove', e => {
  cx = e.clientX; cy = e.clientY;
  cur.style.left = cx+'px'; cur.style.top = cy+'px';
}, {passive:true});
(function loop(){
  rx += (cx-rx)*.1; ry += (cy-ry)*.1;
  curR.style.left = rx+'px'; curR.style.top = ry+'px';
  requestAnimationFrame(loop);
})();
document.querySelectorAll('a').forEach(el=>{
  el.addEventListener('mouseenter',()=>{cur.classList.add('h');curR.classList.add('h');});
  el.addEventListener('mouseleave',()=>{cur.classList.remove('h');curR.classList.remove('h');});
});

/* CANVAS — minimal floating orbs */
const canvas = document.getElementById('cv');
const ctx = canvas.getContext('2d');
let W, H;
function resize(){ W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize(); window.addEventListener('resize', resize);

let mouseX = W/2, mouseY = H/2;
document.addEventListener('mousemove', e => {
  mouseX += (e.clientX - mouseX)*.05;
  mouseY += (e.clientY - mouseY)*.05;
},{passive:true});

// Particle
class P {
  constructor(){ this.reset(true); }
  reset(rand){
    this.x = Math.random()*W;
    this.y = rand ? Math.random()*H : H+10;
    this.vx = (Math.random()-.5)*.18;
    this.vy = -(Math.random()*.15+.05);
    this.r = Math.random()*1.1+.2;
    this.life = 0;
    this.max = Math.random()*400+200;
    this.isRed = Math.random() < .12;
  }
  tick(){
    this.x += this.vx; this.y += this.vy; this.life++;
    if(this.life > this.max || this.y < -10) this.reset(false);
  }
  draw(){
    const a = Math.sin(this.life/this.max*Math.PI) * .18;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    ctx.fillStyle = this.isRed
      ? `rgba(255,59,31,${a*1.4})`
      : `rgba(10,10,10,${a})`;
    ctx.fill();
  }
}
const pts = Array.from({length:90}, ()=>new P());

(function frame(){
  ctx.clearRect(0,0,W,H);

  // soft bg gradient
  const g = ctx.createRadialGradient(W/2, H*.4, 0, W/2, H*.4, W*.6);
  g.addColorStop(0,'rgba(255,248,245,.6)');
  g.addColorStop(.5,'rgba(250,250,248,.3)');
  g.addColorStop(1,'rgba(250,250,248,0)');
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);

  // mouse glow
  const mg = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, 160);
  mg.addColorStop(0,'rgba(255,59,31,.04)');
  mg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle = mg; ctx.fillRect(0,0,W,H);

  // connections
  for(let i=0;i<pts.length;i++) for(let j=i+1;j<pts.length;j++){
    const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y, d=Math.hypot(dx,dy);
    if(d<90){
      ctx.beginPath(); ctx.moveTo(pts[i].x,pts[i].y); ctx.lineTo(pts[j].x,pts[j].y);
      ctx.strokeStyle=`rgba(10,10,10,${(1-d/90)*.025})`; ctx.lineWidth=.4; ctx.stroke();
    }
  }
  pts.forEach(p=>{ p.tick(); p.draw(); });
  requestAnimationFrame(frame);
})();

/* COUNTDOWN — 300 days from launch */
const TARGET = new Date(Date.now() + 300*24*60*60*1000);
function countdown(){
  let diff = Math.max(0, TARGET - new Date());
  const d = Math.floor(diff/864e5); diff %= 864e5;
  const h = Math.floor(diff/36e5);  diff %= 36e5;
  const m = Math.floor(diff/6e4);   diff %= 6e4;
  const s = Math.floor(diff/1e3);
  const p = n => String(n).padStart(2,'0');
  document.getElementById('mv-d').textContent = String(d).padStart(3,'0');
  document.getElementById('mv-h').textContent = p(h);
  document.getElementById('mv-m').textContent = p(m);
  document.getElementById('mv-s').textContent = p(s);
}
countdown(); setInterval(countdown, 1000);

/* STATUS CYCLE */
const msgs = ['SYSTEM ONLINE','BUILDING AI CORE','TRAINING MODELS','SHIPPING SOON'];
let mi = 0;
const stEl = document.getElementById('status-txt');
setInterval(()=>{
  stEl.style.opacity='0';
  setTimeout(()=>{ mi=(mi+1)%msgs.length; stEl.textContent=msgs[mi]; stEl.style.opacity='1'; },260);
}, 2800);
stEl.style.transition='opacity .26s';

/* TICKER */
const items = [
  'POSTIGRAM.APP','CONTENT INTELLIGENCE','AI-POWERED','MULTI-CHANNEL','COMING SOON',
  'SOMETHING EXTRAORDINARY IS BEING BUILT','AUTOMATION','ANALYTICS','GROWTH',
  'POSTIGRAM.APP','CONTENT INTELLIGENCE','AI-POWERED','MULTI-CHANNEL','COMING SOON',
  'SOMETHING EXTRAORDINARY IS BEING BUILT','AUTOMATION','ANALYTICS','GROWTH',
];
const ti = document.getElementById('ticker-inner');
let html = '';
items.forEach((t,i)=>{
  const cls = i%5===0 ? 'tick-red' : '';
  html += `<span class="tick-item ${cls}">${t}<span class="tick-dot"></span></span>`;
});
// duplicate for seamless loop
ti.innerHTML = html + html;
</script>
</body>
</html>
